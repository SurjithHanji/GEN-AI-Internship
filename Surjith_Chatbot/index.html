<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat UI</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="app-container">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <button class="new-chat">+ New Chat</button>
    

    <div class="chat-history">
      <div class="chat-item active">Chat 1</div>
      <div class="chat-item">Chat 2</div>
    </div>

    <div class="profile">
      <i class="fa fa-user"></i> Surjith
    </div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Header -->
    <header class="topbar">
      <button id="menuBtn"><i class="fa fa-bars"></i></button>
      <h5>AI Chat</h5>
    </header>

    <!-- Chat Area -->
    <section class="chat-area">

      <!-- Welcome -->
      <div class="welcome" id="welcome">
        <h2>Hello 👋</h2>
        <div class="suggestions">
          <div class="card suggestion">Explain AI</div>
          <div class="card suggestion">Write Code</div>
          <div class="card suggestion">Give Ideas</div>
          <div class="card suggestion">Debug Code</div>
        </div>
      </div>

      <!-- Messages -->
      <div id="messages"></div>

      <!-- Typing -->
      <div id="typing" class="typing d-none">
        <span></span><span></span><span></span>
      </div>

    </section>

    <!-- Input -->
    <div class="input-area">
      <textarea id="input" placeholder="Type a message..."></textarea>
      <button id="sendBtn"><i class="fa fa-paper-plane"></i></button>
    </div>

  </main>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/chat.js"></script>

</body>
</html>
